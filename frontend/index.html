<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta (static fallback; React updates these dynamically) -->
    <title>KodeAura7 | Software Development Company</title>
    <meta name="description" content="Professional Software Development, Salesforce Solutions, Web Development, Mobile Apps, UI/UX Design, and Digital Marketing. Based in Dehradun, India." />
    <meta name="keywords" content="software development, salesforce CRM, web development, UI UX design, digital marketing, mobile apps, Dehradun, India, KodeAura7" />
    <meta name="author" content="KodeAura7" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#6366F1" />
    <meta name="color-scheme" content="dark" />

    <!-- Canonical (updated per-page by React) -->
    <link rel="canonical" href="https://kodeaura7.in/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="KodeAura7" />
    <meta property="og:title" content="KodeAura7 | Software Development Company" />
    <meta property="og:description" content="Professional Software Development, Salesforce Solutions, Web Development, Mobile Apps, UI/UX Design, and Digital Marketing. Based in Dehradun, India." />
    <meta property="og:url" content="https://kodeaura7.in/" />
    <meta property="og:image" content="https://kodeaura7.in/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="KodeAura7 — Software Development Company" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@kodeaura7" />
    <meta name="twitter:title" content="KodeAura7 | Software Development Company" />
    <meta name="twitter:description" content="Professional Software Development, Salesforce Solutions, Web Development, Mobile Apps, UI/UX Design, and Digital Marketing." />
    <meta name="twitter:image" content="https://kodeaura7.in/og-image.png" />
    <meta name="twitter:image:alt" content="KodeAura7 — Software Development Company" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="mask-icon" href="/favicon.svg" color="#6366F1" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Preconnect to external resources (fonts, API) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Organization Schema (static; React enhances it with live branding data) -->
    <script type="application/ld+json" id="org-schema">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "KodeAura7",
      "url": "https://kodeaura7.in",
      "logo": "https://kodeaura7.in/og-image.png",
      "email": "info@kodeaura7.in",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Dehradun",
        "addressRegion": "Uttarakhand",
        "addressCountry": "IN"
      },
      "sameAs": []
    }
    </script>

    <!-- WebSite Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "KodeAura7",
      "url": "https://kodeaura7.in"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
