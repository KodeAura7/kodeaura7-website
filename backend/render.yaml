services:
  - type: web
    name: kodeaura7-api
    env: node
    plan: starter
    buildCommand: npm install && npm run migrate
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        value: https://mydomain.com
